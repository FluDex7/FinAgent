services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finagent
      POSTGRES_PASSWORD: finagent
      POSTGRES_DB: finagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finagent"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://finagent:finagent@postgres:5432/finagent
      QDRANT_URL: http://qdrant:6333
      STATEMENTS_DIR: /app/data
      MLFLOW_TRACKING_URI: sqlite:////app/mlflow-data/mlflow.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - mlflow_data:/app/mlflow-data
    extra_hosts:
      # lets OLLAMA_HOST=http://host.docker.internal:11434 reach an Ollama
      # running on the host machine, on Linux too (Docker Desktop has this by default).
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      # migrations + uvicorn startup take a few seconds — without this,
      # frontend can start proxying to a backend that isn't listening yet.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  mlflow:
    # Reuses the backend image (already has mlflow + uv) just to serve the UI
    # over the trace data the backend writes into the shared mlflow_data volume.
    build: ./backend
    command: ["uv", "run", "mlflow", "ui", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "sqlite:////app/mlflow-data/mlflow.db"]
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/app/mlflow-data

volumes:
  postgres_data:
  qdrant_data:
  mlflow_data:
