server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS (127.0.0.11) resolves "backend" dynamically, so a
    # restarted backend container gets picked up without restarting nginx too.
    resolver 127.0.0.11 valid=10s;

    # A regex location captures the part after /api/ directly into $1 —
    # unlike `rewrite ... break` combined with a variable-based proxy_pass,
    # which nginx fails on ("invalid URL prefix"), this combination of
    # dynamic upstream + stripped prefix actually works.
    location ~ ^/api/(.*)$ {
        set $backend_upstream http://backend:8000/$1;
        proxy_pass $backend_upstream$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /chat streams via SSE — never buffer it.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
